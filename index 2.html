<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Website</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #1f1c2c, #928dab);
            color: white;
            text-align: center;
        }

        header {
            padding: 60px 20px;
        }

        h1 {
            margin: 0;
            font-size: 40px;
        }

        main {
            background: white;
            color: #333;
            margin: 20px auto;
            padding: 30px;
            max-width: 600px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        button {
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            background: #1f1c2c;
            color: white;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }

        button:hover {
            background: #444;
            transform: scale(1.05);
        }

        #message {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        footer {
            margin-top: 40px;
            padding: 20px;
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>

<body>

<header>
    <h1>🚀 My First Website</h1>
    <p>Learning, building, and growing</p>
</header>

<main>
    <h2>About Me</h2>
    <p>
        I'm learning web development and building real projects.
        This is my first live website hosted online!
    </p>

    <h2>Try It</h2>
    <p>Click the button below:</p>

    <button onclick="showMessage()">Click Me</button>

    <p id="message"></p>
</main>

<footer>
    <p>© 2026 | Built by Me</p>
</footer>

<script>
    function showMessage() {
        document.getElementById("message").innerText =
            "🔥 Nice! You just triggered JavaScript!";
    }
</script>

</body>
</html>
