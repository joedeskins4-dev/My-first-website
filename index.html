<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Website</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            text-align: center;
        }

        header {
            background: #333;
            color: white;
            padding: 30px 20px;
        }

        h1 {
            margin: 0;
        }

        main {
            padding: 20px;
        }

        button {
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            background: #333;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #555;
        }

        #message {
            margin-top: 20px;
            font-size: 18px;
            color: #333;
        }

        footer {
            margin-top: 40px;
            padding: 15px;
            background: #222;
            color: white;
        }
    </style>
</head>

<body>

<header>
    <h1>Welcome to My Website</h1>
    <p>My first step into web development 🚀</p>
</header>

<main>
    <h2>About Me</h2>
    <p>
        I’m learning how to build websites and upload them online.
        This is my first project using HTML, CSS, and JavaScript.
    </p>

    <h2>Try It</h2>
    <p>Click the button below:</p>

    <button onclick="showMessage()">Click Me</button>

    <p id="message"></p>
</main>

<footer>
    <p>© 2026 My First Website</p>
</footer>

<script>
    function showMessage() {
        document.getElementById("message").innerText =
            "Nice! You just triggered JavaScript 🎉";
    }
</script>

</body>
</html>
